name: Build with WebRTC x86

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  BUILD_TYPE: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [x86]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libavcodec-dev libavformat-dev libavutil-dev \
          libswresample-dev pkg-config libssl-dev libsqlite3-dev

    - name: Install LibDataChannel
      run: |
        git clone -b master --depth 1 https://github.com/paullouisageneau/libdatachannel.git
        cd libdatachannel
        git submodule update --init --recursive
        cmake -B build -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=/usr/local \
              -DNO_EXAMPLES=ON -DNO_TESTS=ON
        cmake --build build -j$(nproc)
        sudo cmake --install build

    - name: Configure CMake
      run: |
        cmake -B ${{ github.workspace }}/build \
              -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
              -DENABLE_RTC=ON \
              -DENABLE_HTTPS=ON

    - name: Build
      run: |
        cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

    # 修复路径：media_server 实际生成在 output/media_server
    - name: Prepare artifact
      run: |
        mkdir -p artifact
        cp ${{ github.workspace }}/output/media_server \
           artifact/media_server-${{ matrix.arch }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: media_server-${{ matrix.arch }}
        path: artifact/
        if-no-files-found: error
