name: Build Full Static media_server

on:
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential yasm nasm curl git cmake autoconf automake libtool pkg-config

    # -------------------------
    # Build OpenSSL (static)
    # -------------------------
    - name: Build OpenSSL static
      run: |
        mkdir -p /tmp/openssl
        cd /tmp/openssl
        curl -L https://github.com/openssl/openssl/archive/refs/tags/openssl-3.2.1.tar.gz -o openssl.tar.gz
        tar xf openssl.tar.gz --strip-components=1
        ./Configure linux-x86_64 no-shared --prefix=/usr/local/openssl
        make -j$(nproc)
        sudo make install_sw

    # -------------------------
    # Build zlib (static)
    # -------------------------
    - name: Build zlib static
      run: |
        mkdir -p /tmp/zlib
        cd /tmp/zlib
        curl -L https://zlib.net/zlib-1.3.1.tar.gz -o zlib.tar.gz
        tar xf zlib.tar.gz --strip-components=1
        ./configure --static --prefix=/usr/local
        make -j$(nproc)
        sudo make install

    # -------------------------
    # Build SQLite3 (static)
    # -------------------------
    - name: Build SQLite3 static
      run: |
        mkdir -p /tmp/sqlite
        cd /tmp/sqlite
        curl -L https://www.sqlite.org/2024/sqlite-autoconf-3460000.tar.gz -o sqlite.tar.gz
        tar xf sqlite.tar.gz --strip-components=1
        ./configure --prefix=/usr/local --disable-shared --enable-static
        make -j$(nproc)
        sudo make install

    # -------------------------
    # Build FFmpeg (static)
    # -------------------------
    - name: Build FFmpeg static
      run: |
        mkdir -p /tmp/ffmpeg
        cd /tmp/ffmpeg
        git clone --depth 1 --branch n6.1 https://git.ffmpeg.org/ffmpeg.git .
        PKG_CONFIG_PATH=/usr/local/openssl/lib/pkgconfig ./configure \
          --prefix=/usr/local \
          --disable-shared \
          --enable-static \
          --disable-programs \
          --disable-doc \
          --enable-pic \
          --enable-gpl \
          --enable-version3 \
          --enable-openssl \
          --enable-zlib \
          --enable-avcodec \
          --enable-avformat \
          --enable-avutil \
          --enable-swresample \
          --extra-cflags="-I/usr/local/openssl/include -I/usr/local/include" \
          --extra-ldflags="-L/usr/local/openssl/lib -L/usr/local/lib -static"
        make -j$(nproc)
        sudo make install

    # -------------------------
    # Build LibDataChannel (static)
    # -------------------------
    - name: Build LibDataChannel static
      run: |
        git clone -b master --depth 1 https://github.com/paullouisageneau/libdatachannel.git
        cd libdatachannel
        git submodule update --init --recursive
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr/local \
          -DNO_EXAMPLES=ON \
          -DNO_TESTS=ON \
          -DUSE_SYSTEM_SRTP=OFF \
          -DBUILD_SHARED_LIBS=OFF \
          -DOPENSSL_ROOT_DIR=/usr/local/openssl
        cmake --build build -j$(nproc)
        sudo cmake --install build

    # -------------------------
    # Build media_server
    # -------------------------
    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DENABLE_RTC=ON \
          -DENABLE_HTTPS=ON \
          -DOPENSSL_ROOT_DIR=/usr/local/openssl

    - name: Build
      run: |
        cmake --build build --config ${{ env.BUILD_TYPE }}

    - name: Prepare artifact
      run: |
        mkdir -p artifact
        cp output/media_server artifact/media_server-x86-static

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: media_server-x86-static
        path: artifact/
        if-no-files-found: error
