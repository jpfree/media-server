name: Build with WebRTC

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  BUILD_TYPE: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [x86]   # 未来要扩展其他架构就在这里加

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libavcodec-dev libavformat-dev libavutil-dev libswresample-dev pkg-config libssl-dev libsqlite3-dev

    - name: Install LibDataChannel
      run: |
        git clone -b master --depth 1 https://github.com/paullouisageneau/libdatachannel.git
        cd libdatachannel
        git submodule update --init --recursive
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local -DNO_EXAMPLES=ON -DNO_TESTS=ON
        cmake --build build -j$(nproc)
        sudo cmake --install build

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DENABLE_RTC=ON -DENABLE_HTTPS=ON

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Prepare artifact
      run: |
        mkdir -p output
        cp ${{github.workspace}}/build/media_server output/media_server-${{ matrix.arch }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: media_server-${{ matrix.arch }}
        path: output/
        if-no-files-found: error
