name: Build with WebRTC (Static FFmpeg/SQLite/RTC)

on:
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [x86]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential pkg-config yasm nasm curl \
          autoconf automake libtool

    - name: Build SQLite3 (static)
      run: |
        mkdir -p /tmp/sqlite
        cd /tmp/sqlite
        curl -L https://www.sqlite.org/2024/sqlite-autoconf-3460000.tar.gz -o sqlite.tar.gz
        tar xf sqlite.tar.gz --strip-components=1
        ./configure --prefix=/usr/local --disable-shared --enable-static
        make -j$(nproc)
        sudo make install

    - name: Build FFmpeg (static)
      run: |
        mkdir -p /tmp/ffmpeg
        cd /tmp/ffmpeg
        git clone --depth 1 --branch n6.1 https://git.ffmpeg.org/ffmpeg.git .
        ./configure \
          --prefix=/usr/local \
          --disable-shared \
          --enable-static \
          --disable-programs \
          --disable-doc \
          --enable-gpl \
          --enable-avcodec \
          --enable-avformat \
          --enable-avutil \
          --enable-swresample \
          --disable-network \
          --disable-debug \
          --enable-pic
        make -j$(nproc)
        sudo make install

    - name: Install LibDataChannel (static)
      run: |
        git clone -b master --depth 1 https://github.com/paullouisageneau/libdatachannel.git
        cd libdatachannel
        git submodule update --init --recursive
        cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=/usr/local \
              -DNO_EXAMPLES=ON \
              -DNO_TESTS=ON \
              -DUSE_SYSTEM_SRTP=OFF \
              -DBUILD_SHARED_LIBS=OFF
        cmake --build build -j$(nproc)
        sudo cmake --install build

    - name: Configure CMake
      run: |
        cmake -B ${{ github.workspace }}/build \
              -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
              -DENABLE_RTC=ON \
              -DENABLE_HTTPS=OFF

    - name: Build
      run: |
        cmake --build ${{ github.workspace }}/build --config ${BUILD_TYPE}

    - name: Prepare artifact
      run: |
        mkdir -p artifact
        cp ${{ github.workspace }}/output/media_server \
           artifact/media_server-${{ matrix.arch }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: media_server-${{ matrix.arch }}
        path: artifact/
        if-no-files-found: error
